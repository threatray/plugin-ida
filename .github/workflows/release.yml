name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build release zip
        run: |
          mkdir release
          cp -r threatray_ida release/
          cp threatray_plugin.py release/
          cp requirements.txt release/
          cp CHANGELOG.md release/
          cp README.md release/
          cp LICENSE release/
          cp -r images release/
          cp ida-plugin.json release/ 2>/dev/null || true

          cd release
          zip -r ../threatray-ida-${{ github.ref_name }}.zip .

      - name: Attest build provenance
        if: github.repository_visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: threatray-ida-${{ github.ref_name }}.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            threatray-ida-${{ github.ref_name }}.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes

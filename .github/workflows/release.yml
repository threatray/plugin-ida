name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build release zip
        run: |
          mkdir release
          cp -r threatray_ida release/
          cp threatray_plugin.py release/
          cp requirements.txt release/
          cp CHANGELOG.md release/
          cp README.md release/
          cp LICENSE release/
          cp -r images release/
          cp ida-plugin.json release/ 2>/dev/null || true

          cd release
          zip -r ../threatray-ida-${{ github.ref_name }}.zip .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: threatray-ida-${{ github.ref_name }}.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            threatray-ida-${{ github.ref_name }}.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
